<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dmitrykyd.github.io</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
      opacity: 0.18;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
    }

    .terminal {
      background: rgba(10, 10, 20, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      box-shadow: 0 0 60px rgba(100, 80, 255, 0.15), 0 0 120px rgba(100, 80, 255, 0.06);
      backdrop-filter: blur(8px);
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.8rem;
    }

    .dot {
      width: 13px; height: 13px;
      border-radius: 50%;
    }
    .dot-red   { background: #ff5f57; }
    .dot-yellow{ background: #febc2e; }
    .dot-green { background: #28c840; }

    .terminal-title {
      margin-left: auto;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .prompt-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 1.5rem;
      text-align: left;
      opacity: 0;
      animation: fadeIn 0.4s forwards;
    }
    .prompt-line:nth-child(2) { animation-delay: 0.3s; }
    .prompt-line:nth-child(3) { animation-delay: 1.1s; }
    .prompt-line:nth-child(4) { animation-delay: 1.9s; }

    .prompt-user { color: #6c63ff; }
    .prompt-dir  { color: #28c840; }
    .cmd         { color: #e0e0e0; }
    .output      { color: #e0e0e0; }
    .err         { color: #ff5f57; }
    .ok          { color: #28c840; }

    .main-message {
      margin-top: 2rem;
      opacity: 0;
      animation: fadeIn 0.8s 2.8s forwards;
    }

    .glitch {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      position: relative;
      color: #fff;
      text-shadow: 0 0 20px rgba(108, 99, 255, 0.6);
      animation: glitch 4s infinite;
    }

    @keyframes glitch {
      0%, 94%, 100% { text-shadow: 0 0 20px rgba(108,99,255,0.6); transform: none; }
      95% { transform: translate(-2px, 0); text-shadow: 2px 0 #ff5f57, -2px 0 #6c63ff; }
      97% { transform: translate(2px, 0); text-shadow: -2px 0 #ff5f57, 2px 0 #6c63ff; }
      99% { transform: none; text-shadow: 0 0 20px rgba(108,99,255,0.6); }
    }

    .subtitle {
      margin-top: 1rem;
      font-size: 1.05rem;
      color: #888;
      line-height: 1.6;
    }

    .subtitle span {
      color: #6c63ff;
    }

    .status-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 0.78rem;
      color: #555;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .status-val {
      font-size: 1.2rem;
      font-weight: bold;
      color: #6c63ff;
    }

    .blink {
      animation: blink 1s step-end infinite;
      color: #6c63ff;
    }
    @keyframes blink { 50% { opacity: 0; } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #333;
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="terminal-title">bash — dmitrykyd@github.io</span>
    </div>

    <div class="prompt-line" style="animation-delay:0.3s">
      <span class="prompt-user">dmitrykyd</span><span style="color:#555">@</span><span class="prompt-dir">github.io</span>
      <span style="color:#555">~$</span>
      <span class="cmd">rm -rf ./website</span>
    </div>

    <div class="prompt-line" style="animation-delay:1.1s">
      <span class="err">⚠ removing 4732 files...</span>
    </div>

    <div class="prompt-line" style="animation-delay:1.9s">
      <span class="ok">✓ done. </span>
      <span style="color:#555; margin-left:0.5rem">no regrets.</span>
    </div>

    <div class="main-message">
      <div class="glitch">REBUILDING</div>
      <p class="subtitle">
        Сайт временно переехал<br>
        <span>в голове разработчика</span> 🧠
      </p>

      <div class="status-row">
        <div class="status-item">
          <div class="status-val">0%</div>
          <div>готовность</div>
        </div>
        <div class="status-item">
          <div class="status-val">∞</div>
          <div>чашек кофе</div>
        </div>
        <div class="status-item">
          <div class="status-val">404</div>
          <div>идей пока нет</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    dmitrykyd.github.io &nbsp;·&nbsp; version 0.0.0-alpha <span class="blink">_</span>
  </div>
</div>

<script>
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
  const fontSize = 14;
  let columns = Math.floor(canvas.width / fontSize);
  let drops = Array(columns).fill(1);

  function draw() {
    ctx.fillStyle = 'rgba(10,10,15,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#6c63ff';
    ctx.font = fontSize + 'px monospace';

    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * fontSize, y * fontSize);
      if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }

  setInterval(draw, 50);
</script>
</body>
</html>
